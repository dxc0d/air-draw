kind = "web"
previewPath = "/"
title = "Air Draw"
version = "1.0.0"
id = "artifacts/air-draw"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20121

[services.development]
run = "pnpm --filter @workspace/air-draw run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/air-draw", "run", "build" ]
publicDir = "artifacts/air-draw/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20121"
BASE_PATH = "/"
